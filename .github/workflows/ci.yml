name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  label-check:
    name: Version label
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for version label
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
          for label in major minor patch; do
            if echo "$LABELS" | grep -qx "$label"; then
              echo "Found version label: $label"
              exit 0
            fi
          done
          echo "::error::No version label (major/minor/patch) on this PR. A maintainer must add one before merging."
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.22.x', '1.23.x', '1.24.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify module tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: |
          go build -o /dev/null .
          go build -o /dev/null ./examples/api/stdlibmux
          go build -o /dev/null ./examples/api/gin
          go build -o /dev/null ./examples/api/basic-authed-gin
          go build -o /dev/null ./examples/api/token-authed-gin
          go build -o /dev/null ./examples/requests

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test -race -count=1 -timeout 120s -coverprofile=coverage.out -covermode=atomic $(go list ./... | grep -v /examples/)
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        if: matrix.go-version == '1.24.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
